<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --bg: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* WA Widget Styles */
        .wa-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .wa-btn {
            background-color: var(--primary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
            position: relative;
        }

        .wa-btn:hover {
            transform: scale(1.1);
            background-color: var(--primary-dark);
        }

        /* Pulse effect */
        .wa-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulse 2s infinite;
            box-sizing: border-box;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Popup Box */
        .wa-popup {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 320px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            transform: scale(0);
            opacity: 0;
            transform-origin: bottom right;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .wa-popup.show {
            transform: scale(1);
            opacity: 1;
        }

        .wa-header {
            background: var(--primary);
            padding: 20px;
            text-align: center;
            color: white;
        }

        .wa-header h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .wa-header p {
            margin: 5px 0 15px;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .phone-input-container {
            display: flex;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 5px 10px;
            align-items: center;
        }

        .phone-input-container span {
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: 5px;
        }

        .phone-input-container input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
        }

        .phone-input-container input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .wa-body {
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
        }

        .wa-body::-webkit-scrollbar {
            width: 5px;
        }
        .wa-body::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .wa-option {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            user-select: none;
        }

        .wa-option:last-child {
            margin-bottom: 0;
        }

        .wa-option:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .wa-option i {
            font-size: 1.2rem;
            margin-right: 15px;
            color: var(--primary);
            width: 25px;
            text-align: center;
        }

        .wa-option-text {
            display: flex;
            flex-direction: column;
        }

        .wa-option-title {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .wa-option-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        #notification {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            pointer-events: none;
        }

        #notification.show {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div>
        <h1>JackBOT Fonnte Integration</h1>
        <p style="text-align: center; color: var(--text-muted);">Backend is running with Fonnte API Webhooks.</p>
    </div>

    <!-- WhatsApp Widget -->
    <div class="wa-widget">
        <div id="notification">Pesan Terkirim! ✅</div>
        <div class="wa-popup" id="waPopup">
            <div class="wa-header">
                <h3>💬 Butuh Bantuan?</h3>
                <p>Masukkan nomor WA kamu dan pilih menu</p>
                
                <div class="phone-input-container">
                    <span>+62</span>
                    <input type="text" id="userPhone" placeholder="81234567890" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>
            <div class="wa-body" id="waCategoryList">
                <!-- Kategori akan di-generate via JavaScript -->
            </div>
        </div>
        
        <div class="wa-btn" id="waBtn" onclick="togglePopup()">
            <i class="fab fa-whatsapp"></i>
        </div>
    </div>

    <script>
        const categories = [
            {
                title: 'Tanya AI',
                desc: 'Chatbot AI Pintar',
                icon: 'fa-solid fa-robot',
                command: 'bot, halo'
            },
            {
                title: 'Downloader',
                desc: 'Unduh Video & Musik',
                icon: 'fa-solid fa-download',
                command: '!yt'
            },
            {
                title: 'Sticker Maker',
                desc: 'Buat stiker dari gambar',
                icon: 'fa-solid fa-sticky-note',
                command: '!s'
            },
            {
                title: 'Games & Kuis',
                desc: 'Main game seru',
                icon: 'fa-solid fa-gamepad',
                command: '!menu' // Diubah ke !menu untuk demo Webhook list message
            }
        ];

        function renderCategories() {
            const container = document.getElementById('waCategoryList');
            categories.forEach((cat, index) => {
                const optionHtml = `
                    <div class="wa-option" onclick="sendToWA('${index}')">
                        <i class="${cat.icon}"></i>
                        <div class="wa-option-text">
                            <span class="wa-option-title">${cat.title}</span>
                            <span class="wa-option-desc">${cat.desc}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += optionHtml;
            });
        }

        async function sendToWA(index) {
            const rawPhone = document.getElementById('userPhone').value.trim();
            if (!rawPhone) {
                alert("Silakan masukkan nomor WhatsApp Anda terlebih dahulu.");
                return;
            }

            // Normalisasi nomor ke format 62...
            let finalPhone = rawPhone;
            if (rawPhone.startsWith('0')) {
                finalPhone = '62' + rawPhone.substring(1);
            } else if (!rawPhone.startsWith('62')) {
                finalPhone = '62' + rawPhone;
            }

            const cat = categories[index];
            const payload = {
                phone: finalPhone,
                command: cat.command,
                title: cat.title
            };

            try {
                // Kirim request ke backend Flask
                const res = await fetch('/api/send-widget', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    showNotification();
                    setTimeout(togglePopup, 1500); // Tutup popup setelah 1.5 detik
                } else {
                    alert("Gagal mengirim pesan: " + data.message);
                }
            } catch (err) {
                console.error(err);
                alert("Terjadi kesalahan jaringan.");
            }
        }

        function togglePopup() {
            const popup = document.getElementById('waPopup');
            popup.classList.toggle('show');
        }

        function showNotification() {
            const notif = document.getElementById('notification');
            notif.classList.add('show');
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }

        // Initialize
        renderCategories();
    </script>
</body>
</html>
